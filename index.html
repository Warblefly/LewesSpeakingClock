<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lewes Speaking Clock</title>
<style>
  :root {
    /* Base sizing */
    font-size: 16px;
    color-scheme: light dark;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 1.5rem;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f5;
    color: #111;
    display: flex;
    min-height: 100vh;
  }.container {
    margin: auto;
    max-width: 28rem; /* ~450px */
    width: 100%;
    padding: 1.5rem;
    border-radius: 0.75rem;
    background: #ffffff;
    box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.08);
  }

  h1 {
    font-size: 1.6rem;
    margin-top: 0;
    margin-bottom: 0.75rem;
  }

  p {
    margin-top: 0;
    margin-bottom: 1rem;
    line-height: 1.4;
  }

  button {
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    background: #0066cc;
    color: #fff;
    transition: background 0.15s ease, transform 0.1s ease;
    width: 100%;
  }

  button:hover:not(:disabled) {
    background: #0050a3;
    transform: translateY(-1px);
  }

  button:active:not(:disabled) {
    transform: translateY(1px);
  }

  button:disabled {
    opacity: 0.6;
    cursor: default;
  }

  #status {
    margin-top: 0.75rem;
    font-size: 0.9rem;
    white-space: pre-line;
    color: #333;
  }

  #nextAnnouncement {
    margin-top: 0.25rem;
    font-size: 0.9rem;
    color: #555;
  }

  #countdown {
    margin-top: 0.25rem;
    font-size: 0.9rem;
    color: #444;
  }

  /* On very small devices, slightly reduce base font size */
  @media (max-width: 360px) {
    :root {
      font-size: 15px;
    }.container {
      padding: 1.2rem;
    }
  }

  /* Dark mode (optional, respects system setting) */
  @media (prefers-color-scheme: dark) {
    body {
      background: #111;
      color: #eee;
    }.container {
      background: #1d1d1d;
      box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.6);
    }
    #status, #nextAnnouncement, #countdown {
      color: #ccc;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Lewes Speaking Clock</h1>
    <p>
      This page will announce the time in Lewes and play three tones,
      with the third tone exactly on the announced second.
    </p>
    <button id="startButton">Start speaking clock</button>
    <div id="status">Status: waiting for you to start the Speaking Clock.</div>
    <div id="nextAnnouncement"></div>
    <div id="countdown"></div>
  </div>

  <script>
    // =============================
    // CONFIGURATION
    // =============================

    const AUDIO_BASE_PATH = 'audio/';

    // Lead-in before the FIRST tone (fixed preference):
    // Speech starts this many seconds BEFORE the first tone at T-2.
    // Adjust this to taste (smaller value -> speech starts later).
    const LEAD_IN_BEFORE_FIRST_TONE = 7.5; // e.g. 7.5 seconds

    // Gaps between speech clips (in seconds)
    const configGaps = {
      gapIntroHour:     0.05, // intro -> hour
      gapHourMinute:    0.03, // hour -> minute
      gapMinuteSeconds: 0.02  // minute -> seconds phrase
    };

    // Tone frequencies for T-2, T-1, T (E4, G4, C5)
    const TONE_FREQUENCIES = [659.25, 783.99, 1046.50];

    const TONE_DURATION = 0.20;          // seconds
    const SCHEDULE_AHEAD_SECONDS = 5;    // schedule this many seconds before speech start

    // Server time endpoint
    const TIME_API_URL = 'time.php';


    // =============================
    // AUDIO CONTEXT AND LOADING
    // =============================

    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    let startWallMs;
    let startAudioTime;

    // Track next announcement time for display / countdown
    let nextTargetDate = null;      // announced time T (for display)
    let nextSpeechStartMs = null;   // S (first intro start) in ms
    let countdownTimerId = null;
    let hasStartedFirstAnnouncement = false;

    const clips = {
      intro: null,
      hours: [],
      minutes: [],
      seconds: {}
    };

    const statusEl = document.getElementById('status');
    const startButton = document.getElementById('startButton');
    const nextAnnouncementEl = document.getElementById('nextAnnouncement');
    const countdownEl = document.getElementById('countdown');


    function logStatus(message) {
      console.log(message);
      statusEl.textContent = 'Status: ' + message;
    }

    async function loadAudioBuffer(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error('Failed to load ' + url + ': ' + response.status);
      }
      const arrayBuffer = await response.arrayBuffer();
      return await audioCtx.decodeAudioData(arrayBuffer);
    }

    async function loadAllClips() {
      logStatus('Loading audio clips...');

      // Intro
      clips.intro = await loadAudioBuffer(AUDIO_BASE_PATH + 'intro.mp3');

      // Hours: hour_nn.mp3, where nn = 12, 01..11
      const hourNames = ['12', '01', '02', '03', '04', '05', '06',
                         '07', '08', '09', '10', '11'];
      const loadedHourBuffers = {};
      for (const name of hourNames) {
        const url = AUDIO_BASE_PATH + 'hour_' + name + '.mp3';
        loadedHourBuffers[name] = await loadAudioBuffer(url);
      }

      // Minutes: minutes_nn.mp3, nn = 00..59
      for (let m = 0; m < 60; m++) {
        const mm = m.toString().padStart(2, '0');
        const url = AUDIO_BASE_PATH + 'minutes_' + mm + '.mp3';
        clips.minutes[m] = await loadAudioBuffer(url);
      }

      // Seconds: seconds_nn.mp3 for nn = 00, 10, 20, 30, 40, 50
      const secondsValues = [0, 10, 20, 30, 40, 50];
      for (const s of secondsValues) {
        const ss = s.toString().padStart(2, '0');
        const url = AUDIO_BASE_PATH + 'seconds_' + ss + '.mp3';
        clips.seconds[s] = await loadAudioBuffer(url);
      }

      // Map 24-hour clock to the 12 files
      clips.hours = [];
      for (let h = 0; h < 24; h++) {
        let name;
        const hourMod12 = h % 12;
        if (hourMod12 === 0) {
          name = '12';
        } else {
          name = hourMod12.toString().padStart(2, '0');
        }
        clips.hours[h] = loadedHourBuffers[name];
      }

      logStatus('All audio clips loaded.');
    }


    // =============================
    // COUNTDOWN LOOP (FIRST ANNOUNCEMENT ONLY)
    // =============================

    function startCountdownLoop() {
      if (countdownTimerId !== null) {
        clearInterval(countdownTimerId);
        countdownTimerId = null;
      }

      countdownTimerId = setInterval(() => {
        // If we've already started the first announcement, stop and clear.
        if (hasStartedFirstAnnouncement) {
          clearInterval(countdownTimerId);
          countdownTimerId = null;
          countdownEl.textContent = '';
          return;
        }

        if (nextSpeechStartMs === null) {
          countdownEl.textContent = '';
          return;
        }

        const nowMs = getTrustedNowMs();
        const remainingMs = nextSpeechStartMs - nowMs;

        if (remainingMs <= 0) {
          // We have reached or passed the speech start time.
          hasStartedFirstAnnouncement = true;
          countdownEl.textContent = '';
          clearInterval(countdownTimerId);
          countdownTimerId = null;
          return;
        }

        const seconds = remainingMs / 1000;
        countdownEl.textContent =
          'Time to announcement: ' + seconds.toFixed(1) + ' s';
      }, 100);
    }


    // =============================
    // TIME MAPPING: WALL -> AUDIO
    // =============================

    function initTimeMapping() {
      startWallMs = getTrustedNowMs();     // use trusted time
      startAudioTime = audioCtx.currentTime;
    }

    function wallToAudioTime(targetWallMs) {
      const nowWallMs = getTrustedNowMs(); // use trusted time
      const nowAudio = audioCtx.currentTime;

      const elapsedWallSec = (nowWallMs - startWallMs) / 1000;
      const expectedAudio = startAudioTime + elapsedWallSec;
      const drift = nowAudio - expectedAudio;

      const targetElapsedWallSec = (targetWallMs - startWallMs) / 1000;
      const idealAudioTime = startAudioTime + targetElapsedWallSec;

      return idealAudioTime + drift;
    }


    // =============================
    // SERVER TIME SYNC
    // =============================

    let serverTimeOffsetMs = 0;     // serverTime ≈ clientTime + offset
    let serverTimeOffsetValid = false;

    function getTrustedNowMs() {
      const localMs = Date.now();
      if (!serverTimeOffsetValid) {
        return localMs;
      }
      return localMs + serverTimeOffsetMs;
    }

    async function syncWithServerTimeOnce() {
      const url = TIME_API_URL;

      const t0 = performance.now();
      const localBeforeMs = Date.now();

      const response = await fetch(url, { cache: 'no-store' });
      const data = await response.json();

      const t1 = performance.now();
      const localAfterMs = Date.now();

      const serverUtcMs = data.utcMillis;

      const rttMs = t1 - t0;
      const oneWayDelayMs = rttMs / 2;
      const clientMidMs = localBeforeMs + oneWayDelayMs;

      const offset = serverUtcMs - clientMidMs;
      serverTimeOffsetMs = offset;
      serverTimeOffsetValid = true;

      console.log(
        'Server time sync: RTT ~', rttMs.toFixed(1),
        'ms, offset ~', offset.toFixed(1), 'ms'
      );
    }

    async function refineServerTimeOffset(attempts = 5) {
      let best = null;

      for (let i = 0; i < attempts; i++) {
        const t0 = performance.now();
        const localBeforeMs = Date.now();

        const response = await fetch(TIME_API_URL, { cache: 'no-store' });
        const data = await response.json();

        const t1 = performance.now();
        const localAfterMs = Date.now();

        const serverUtcMs = data.utcMillis;
        const rttMs = t1 - t0;
        const oneWayDelayMs = rttMs / 2;
        const clientMidMs = localBeforeMs + oneWayDelayMs;
        const offset = serverUtcMs - clientMidMs;

        if (!best || rttMs < best.rttMs) {
          best = { rttMs, offset };
        }
      }

      if (best) {
        serverTimeOffsetMs = best.offset;
        serverTimeOffsetValid = true;
        console.log(
          'Refined server time offset:',
          'RTT ~', best.rttMs.toFixed(1), 'ms,',
          'offset ~', best.offset.toFixed(1), 'ms'
        );
      }
    }


    // =============================
    // SCHEDULING HELPERS
    // =============================

    function scheduleBufferAtTime(buffer, whenAudio) {
      const now = audioCtx.currentTime;
      if (whenAudio < now) {
        console.warn(
          'Buffer scheduled in the past by',
          (now - whenAudio).toFixed(3),
          'seconds; clamping to now.'
        );
      }
      const safeWhen = Math.max(whenAudio, now);

      const src = audioCtx.createBufferSource();
      src.buffer = buffer;
      src.connect(audioCtx.destination);  // FIXED
      src.start(safeWhen);
      return src;
    }


function scheduleToneAtTime(audioTime, frequency, duration = TONE_DURATION) {
  const now = audioCtx.currentTime;
  if (audioTime < now) {
    console.warn(
      'Tone scheduled in the past by',
      (now - audioTime).toFixed(3),
      'seconds; clamping to now.'
    );
  }
  const safeTime = Math.max(audioTime, now);

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = frequency;
  osc.type = 'triangle'; // bright but not harsh; use 'sine' if you prefer

  // Longer, more assertive pip
  const attack = 0.0001;                 // 0.1 ms attack
  const sustain = duration * 0.2;      // flat-ish middle
  const release = duration * 0.6;      // fade out
  const peak = 0.8;                    // fairly loud (0..1)

  // Attack to peak
  gain.gain.setValueAtTime(0.0, safeTime);
  gain.gain.linearRampToValueAtTime(peak, safeTime + attack);

  // Sustain
  gain.gain.setValueAtTime(peak, safeTime + sustain);

  // Release to 0
  gain.gain.linearRampToValueAtTime(0.0, safeTime + sustain + release);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(safeTime);
  osc.stop(safeTime + sustain + release);
}


    // =============================
    // SPEECH CHAIN SCHEDULING
    // =============================

    function scheduleSpeechForTime(targetDate, introStartAudioTime) {
      const hours = targetDate.getHours();
      const minutes = targetDate.getMinutes();
      const seconds = targetDate.getSeconds();

      const introBuf   = clips.intro;
      const hourBuf    = clips.hours[hours];
      const minuteBuf  = clips.minutes[minutes];
      const secondsBuf = clips.seconds[seconds];

      const dIntro   = introBuf.duration;
      const dHour    = hourBuf.duration;
      const dMinute  = minuteBuf.duration;
      const dSeconds = secondsBuf.duration;

      const g1 = configGaps.gapIntroHour;
      const g2 = configGaps.gapHourMinute;
      const g3 = configGaps.gapMinuteSeconds;

      const tIntro   = introStartAudioTime;
      const tHour    = tIntro   + dIntro   + g1;
      const tMinute  = tHour    + dHour    + g2;
      const tSeconds = tMinute  + dMinute  + g3;

      scheduleBufferAtTime(introBuf,   tIntro);
      scheduleBufferAtTime(hourBuf,    tHour);
      scheduleBufferAtTime(minuteBuf,  tMinute);
      scheduleBufferAtTime(secondsBuf, tSeconds);

      const speechEndAudioTime = tSeconds + dSeconds;
      return speechEndAudioTime;
    }


    // =============================
    // TONES SCHEDULING
    // =============================

    function scheduleThreeTonesAtT(targetDate) {
      const T_ms = targetDate.getTime();
      const relativeOffsetsSec = [-2, -1, 0]; // T-2, T-1, T

      relativeOffsetsSec.forEach((offsetSec, index) => {
        const toneWallMs = T_ms + offsetSec * 1000;
        const audioTime = wallToAudioTime(toneWallMs);
        const freq = TONE_FREQUENCIES[index];
        scheduleToneAtTime(audioTime, freq, TONE_DURATION);
      });
    }


    // =============================
    // ANNOUNCEMENT TIMING LOGIC
    // =============================

    function getNextAnnouncementTimeFrom(now) {
      // Next multiple of 10 seconds
      const seconds = now.getSeconds();
      const extra = 10 - (seconds % 10);
      const target = new Date(now.getTime() + extra * 1000);
      target.setMilliseconds(0);
      return target;
    }

    function getNextAnnouncementTime() {
      const trustedNowMs = getTrustedNowMs();
      const now = new Date(trustedNowMs);
      return getNextAnnouncementTimeFrom(now);
    }

    function scheduleAnnouncement(targetDate) {
      const T_ms = targetDate.getTime();

      // Speech start wall time S relative to first tone at T-2
      const S_wallMs = T_ms - (LEAD_IN_BEFORE_FIRST_TONE + 2) * 1000;

      const nowWall = getTrustedNowMs();
      const nowAudio = audioCtx.currentTime;

      if (S_wallMs < nowWall - 200) {
        console.warn(
          'Speech start for', targetDate.toLocaleTimeString(),
          'is already in the past; skipping this T.'
        );
        return;
      }

      const introStartAudioTime = wallToAudioTime(S_wallMs);

      if (introStartAudioTime < nowAudio - 0.1) {
        console.warn(
          'Intro start audio time for', targetDate.toLocaleTimeString(),
          'is already in the past by',
          (nowAudio - introStartAudioTime).toFixed(3),
          's; skipping this T.'
        );
        return;
      }

      logStatus(
        'Scheduling announcement for ' + targetDate.toLocaleTimeString() +
        ' (speech start at ' + new Date(S_wallMs).toLocaleTimeString() + ')'
      );

      scheduleSpeechForTime(targetDate, introStartAudioTime);
      scheduleThreeTonesAtT(targetDate);
    }

    function scheduleNextCycle() {
      const nowWall = getTrustedNowMs();
      let candidateNow = new Date(nowWall);

      while (true) {
        const targetDate = getNextAnnouncementTimeFrom(candidateNow);
        const T_ms = targetDate.getTime();
        const S_wallMs = T_ms - (LEAD_IN_BEFORE_FIRST_TONE + 2) * 1000;
        const callTimeWallMs = S_wallMs - SCHEDULE_AHEAD_SECONDS * 1000;

        if (callTimeWallMs <= nowWall) {
          // Not enough lead time; move candidateNow forward and try again
          candidateNow = new Date(T_ms + 1000);
          continue;
        }

        const delayMs = callTimeWallMs - nowWall;

        // Store globally for display
        nextTargetDate = targetDate;

        // Only set up countdown for the very first announcement
        if (!hasStartedFirstAnnouncement && nextSpeechStartMs === null) {
          nextSpeechStartMs = S_wallMs;
          startCountdownLoop();
        }

        // Update UI for next announcement (the time the beeps refer to)
        nextAnnouncementEl.textContent =
          'Next announcement: ' + targetDate.toLocaleTimeString();

        console.log(
          'Next target:', targetDate.toLocaleTimeString(),
          '| speech start:', new Date(S_wallMs).toLocaleTimeString(),
          '| scheduling in', delayMs.toFixed(0), 'ms'
        );

        setTimeout(() => {
          scheduleAnnouncement(targetDate);
          scheduleNextCycle();
        }, delayMs);

        break;
      }
    }


    // =============================
    // STARTUP LOGIC
    // =============================

    startButton.addEventListener('click', async () => {
      try {
        // Immediately disable to prevent double start
        startButton.disabled = true;
        startButton.textContent = 'Starting...';
        logStatus('Initialising speaking clock...');

        if (!audioCtx) {
          audioCtx = new AudioContextClass();
        }

        await audioCtx.resume();

        // Sync with server time before starting
        logStatus('Synchronising with server time...');
        await refineServerTimeOffset(5);

        // Capture initial mapping using trusted time
        initTimeMapping();

        // Load audio
        logStatus('Loading audio clips...');
        await loadAllClips();

        logStatus('Starting speaking clock...');
        startButton.textContent = 'Speaking clock is running';

        // Kick off scheduling
        scheduleNextCycle();
      } catch (err) {
        console.error(err);
        logStatus('Error: ' + err.message);
        // If something failed, allow the user to try again
        startButton.disabled = false;
        startButton.textContent = 'Start speaking clock';
      }
    });
  </script>
</body>
</html>
